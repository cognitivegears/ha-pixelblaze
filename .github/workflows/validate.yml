name: Validate

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov pytest-homeassistant-custom-component packaging ruff mypy pixelblaze-client==1.1.7
      - name: Check dependency sync (manifest vs pyproject)
        run: |
          python scripts/check_requirements_sync.py
          python scripts/sync_manifest_requirements.py --check
      - name: Lint
        run: |
          ruff check custom_components/pixelblaze tests scripts
          ruff format --check custom_components/pixelblaze tests scripts
      - name: Type check
        run: |
          mypy custom_components/pixelblaze
      - name: Run tests with coverage
        run: |
          pytest -q --cov=custom_components/pixelblaze --cov-report=term-missing --cov-report=xml --cov-branch --cov-fail-under=80
